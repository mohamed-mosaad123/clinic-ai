services:
  # ---------------------------------------------------------------------------
  # Database Service: SQL Server 2022
  # ---------------------------------------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: clinic_db
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "${SQL_SERVER_PORT}:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - clinic_network

  # ---------------------------------------------------------------------------
  # AI Service: FastAPI + AI Models
  # ---------------------------------------------------------------------------
  clinicai:
    build:
      context: ./ClinicAI
      dockerfile: Dockerfile
    container_name: clinic_ai_service
    restart: always
    ports:
      - "${FASTAPI_PORT}:8000"
    environment:
      - DEBUG=${DEBUG_MODE}
      - APP_NAME=ClinicAI-Production
      - API_KEY=${AI_API_KEY}
    volumes:
      - ./ClinicAI/models:/app/models
    networks:
      - clinic_network

  # ---------------------------------------------------------------------------
  # Backend Service: ASP.NET Core 8.0 API
  # ---------------------------------------------------------------------------
  clinic-backend:
    build:
      context: "./Clinic Project"
      dockerfile: Dockerfile
      network: host
    container_name: clinic_api_service
    restart: always
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - AIService__BaseUrl=${AI_SERVICE_BASE_URL}
      - AIService__ApiKey=${AI_API_KEY}
      - JWT__SecretKey=${JWT_SECRET_KEY}
      - JWT__Issuer=${JWT_ISSUER}
      - JWT__Audience=${JWT_AUDIENCE}
    depends_on:
      sqlserver:
        condition: service_healthy
      clinicai:
        condition: service_started
    networks:
      - clinic_network

  # ---------------------------------------------------------------------------
  # Frontend Service: React + Vite (served by Nginx)
  # ---------------------------------------------------------------------------
  clinic-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT}
    container_name: clinic_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - clinic-backend
    networks:
      - clinic_network

networks:
  clinic_network:
    driver: bridge

volumes:
  sql_data:
    driver: local
